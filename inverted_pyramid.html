<!DOCTYPE html>
<html>
<head>
<title>inverted Pyramid</title>
</head>
<body>

<h2>Inverted Pyramid</h2>
<pre id="output"></pre>

<script>
let n=5;
let output="";

for(let i=n;i>=1;i--){
    for(let j=1;j<=i;j++){
        output+="* ";
    }
    output+="\n";
}

console.log(output);
</script>

</body>
</html>
